<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Message Board</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0a2e;
            color: #e0e0ff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            min-height: 100vh;
            padding: 2rem 1rem;
            image-rendering: pixelated;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 4px solid #ff6b9d;
            background: #0d0521;
            position: relative;
            box-shadow: 8px 8px 0 #000;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 2px solid #5b21b6;
            pointer-events: none;
        }

        .header h1 {
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            color: #ff6b9d;
            text-shadow: 3px 3px 0 #5b21b6, -1px -1px 0 #00d4ff;
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .header .subtitle {
            font-size: 0.55rem;
            color: #00d4ff;
            letter-spacing: 2px;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .form-box {
            background: #0d0521;
            border: 4px solid #5b21b6;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 8px 8px 0 #000;
            position: relative;
        }

        .form-box::after {
            content: '>_';
            position: absolute;
            top: -12px;
            left: 12px;
            background: #0d0521;
            padding: 0 8px;
            color: #00d4ff;
            font-size: 0.7rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.6rem;
            color: #00d4ff;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 0 #5b21b6;
        }

        .form-group label .optional {
            color: #666;
            font-size: 0.5rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: #1a0a2e;
            border: 3px solid #3b1f7a;
            color: #e0e0ff;
            font-family: inherit;
            font-size: 0.65rem;
            padding: 0.75rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 8px rgba(255, 107, 157, 0.3);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
            line-height: 1.8;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #4a3a6a;
        }

        .char-count {
            font-size: 0.5rem;
            color: #666;
            text-align: right;
            margin-top: 0.3rem;
        }

        .char-count.warn {
            color: #ff6b9d;
        }

        .submit-btn {
            width: 100%;
            background: #ff6b9d;
            border: none;
            border-bottom: 4px solid #c94575;
            color: #fff;
            font-family: inherit;
            font-size: 0.7rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            background: #ff8bb5;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #c94575;
        }

        .submit-btn:active {
            transform: translateY(0);
            border-bottom-width: 2px;
            box-shadow: 0 2px 0 #c94575;
        }

        .submit-btn:disabled {
            background: #4a3a6a;
            border-bottom-color: #2a1f4a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .messages-section {
            margin-top: 2rem;
        }

        .section-title {
            font-size: 0.65rem;
            color: #00d4ff;
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 0 #5b21b6;
        }

        .message-card {
            background: #0d0521;
            border: 3px solid #3b1f7a;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
            box-shadow: 4px 4px 0 #000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-card .author {
            font-size: 0.55rem;
            color: #ff6b9d;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .message-card .author::before {
            content: '@';
            color: #00d4ff;
        }

        .message-card .anonymous {
            color: #666;
        }

        .message-card .time {
            font-size: 0.45rem;
            color: #4a3a6a;
            margin-left: auto;
        }

        .message-card .content {
            font-size: 0.6rem;
            line-height: 1.8;
            color: #e0e0ff;
            word-break: break-word;
        }

        .message-card .index-badge {
            position: absolute;
            top: -8px;
            right: 12px;
            background: #5b21b6;
            color: #00d4ff;
            font-size: 0.4rem;
            padding: 2px 8px;
            border: 2px solid #1a0a2e;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #4a3a6a;
            font-size: 0.6rem;
            line-height: 2;
        }

        .empty-state .icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #00d4ff;
            font-size: 0.6rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #5b21b6;
            border: 3px solid #ff6b9d;
            color: #fff;
            font-family: inherit;
            font-size: 0.6rem;
            padding: 1rem 2rem;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.3s ease-out;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: #00d4ff;
            background: #0d3b3b;
        }

        .toast.error {
            border-color: #ff4444;
            background: #3b0d0d;
        }

        .nav-link {
            text-align: center;
            margin-top: 2rem;
        }

        .nav-link a {
            color: #4a3a6a;
            font-size: 0.5rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link a:hover {
            color: #00d4ff;
        }

        .pixel-divider {
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                #5b21b6 0px,
                #5b21b6 8px,
                transparent 8px,
                transparent 16px
            );
            margin: 2rem 0;
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }
            .form-box, .message-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="header">
            <h1>Pixel Message Board</h1>
            <div class="subtitle">Leave your mark in the digital void</div>
        </div>

        <div class="form-box">
            <form id="message-form">
                <div class="form-group">
                    <label>Your Name <span class="optional">(optional)</span></label>
                    <input type="text" id="author" placeholder="Anonymous wanderer..." maxlength="30" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="content" placeholder="Write something to the void..." maxlength="500" required></textarea>
                    <div class="char-count" id="char-count">0 / 500</div>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Post via GitHub</button>
            </form>
        </div>

        <div class="pixel-divider"></div>

        <div class="messages-section">
            <div class="section-title">~ Recent Messages ~</div>
            <div id="messages-list">
                <div class="loading">Loading messages...</div>
            </div>
        </div>

        <div class="nav-link">
            <a href="admin.html">[ Admin Panel ]</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Configuration - 修改为你的 GitHub 仓库信息
        const CONFIG = {
            owner: 'wangxs101',
            repo: 'message-board',
            issueLabel: 'message-board'
        };

        // 生成星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 80;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // 字符计数
        const contentEl = document.getElementById('content');
        const charCountEl = document.getElementById('char-count');
        contentEl.addEventListener('input', () => {
            const len = contentEl.value.length;
            charCountEl.textContent = `${len} / 500`;
            charCountEl.className = 'char-count' + (len > 450 ? ' warn' : '');
        });

        // Toast 提示
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (type ? ' ' + type : '');
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 留言提交：跳转到 GitHub 创建 Issue 页面（无需 Token）
        document.getElementById('message-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const author = document.getElementById('author').value.trim() || 'Anonymous';
            const content = document.getElementById('content').value.trim();

            if (!content) {
                showToast('Message cannot be empty!', 'error');
                return;
            }

            const title = encodeURIComponent(`[Message] ${author}`);
            const body = encodeURIComponent(`**From:** ${author}\n\n${content}\n\n---\n*Submitted from [Pixel Message Board](https://${CONFIG.owner}.github.io/${CONFIG.repo}/)*`);
            const labels = encodeURIComponent(CONFIG.issueLabel);

            const issueUrl = `https://github.com/${CONFIG.owner}/${CONFIG.repo}/issues/new?title=${title}&body=${body}&labels=${labels}`;
            window.open(issueUrl, '_blank');

            showToast('Redirecting to GitHub...', 'success');
            document.getElementById('author').value = '';
            document.getElementById('content').value = '';
            charCountEl.textContent = '0 / 500';
        });

        const API_BASE = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/issues`;

        // 加载留言（只读，不需要 token）
        async function loadMessages() {
            const listEl = document.getElementById('messages-list');
            listEl.innerHTML = '<div class="loading">Loading messages...</div>';

            try {
                const url = `${API_BASE}?labels=${CONFIG.issueLabel}&state=all&sort=created&direction=desc&per_page=30`;
                const response = await fetch(url, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' }
                });

                if (!response.ok) {
                    listEl.innerHTML = '<div class="empty-state"><span class="icon">[?]</span>Failed to load messages</div>';
                    return;
                }

                const issues = await response.json();

                if (issues.length === 0) {
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <span class="icon">[ _ ]</span>
                            No messages yet...<br>
                            Be the first to leave a mark!
                        </div>
                    `;
                    return;
                }

                listEl.innerHTML = issues.map((issue, idx) => {
                    const body = issue.body || '';
                    const fromMatch = body.match(/\*\*From:\*\* (.+)/);
                    const author = fromMatch ? fromMatch[1] : 'Unknown';
                    const content = body.replace(/\*\*From:\*\* .+\n\n?/, '').trim();
                    const time = new Date(issue.created_at).toLocaleString('zh-CN', {
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    return `
                        <div class="message-card">
                            <span class="index-badge">#${issues.length - idx}</span>
                            <div class="author">
                                ${author === 'Anonymous' ? '<span class="anonymous">Anonymous</span>' : author}
                                <span class="time">${time}</span>
                            </div>
                            <div class="content">${escapeHtml(content)}</div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                listEl.innerHTML = '<div class="empty-state"><span class="icon">[!]</span>Network error</div>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载时获取留言
        loadMessages();
    </script>
</body>
</html>
