<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome back</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@400;700&display=swap');

        /* 让中文字体与 Press Start 2P 大小一致 */
        @font-face {
            font-family: 'Noto Sans SC Fitted';
            src: local('Noto Sans SC');
            size-adjust: 200%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0ff;
            font-family: 'Press Start 2P', 'Noto Sans SC Fitted', 'Courier New', monospace;
            font-weight: 700;
            min-height: 100vh;
            padding: 2rem 1rem;
            image-rendering: pixelated;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 4px solid #00d4ff;
            background: #050510;
            position: relative;
            box-shadow: 8px 8px 0 #000;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 2px solid #1a1a3a;
            pointer-events: none;
        }

        .header h1 {
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            color: #00d4ff;
            text-shadow: 3px 3px 0 #1a1a3a;
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .header .subtitle {
            font-size: 0.55rem;
            color: #ff6b9d;
            letter-spacing: 2px;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .form-box {
            background: #050510;
            border: 4px solid #5b21b6;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 8px 8px 0 #000;
            position: relative;
        }

        .form-box::after {
            content: '>_';
            position: absolute;
            top: -12px;
            left: 12px;
            background: #050510;
            padding: 0 8px;
            color: #00d4ff;
            font-size: 0.7rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.6rem;
            color: #00d4ff;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 0 #1a1a3a;
        }

        .form-group label .optional {
            color: #666;
            font-size: 0.5rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: #0a0a1a;
            border: 3px solid #3b1f7a;
            color: #e0e0ff;
            font-family: 'Press Start 2P', 'Noto Sans SC Fitted', monospace;
            font-weight: 700;
            font-size: 0.65rem;
            padding: 0.75rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
            line-height: 2.2;
            letter-spacing: 0.15em;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #3a3a5a;
        }

        .char-count {
            font-size: 0.5rem;
            color: #4a4a6a;
            text-align: right;
            margin-top: 0.3rem;
        }

        .char-count.warn {
            color: #ff6b9d;
        }

        .submit-btn {
            width: 100%;
            background: #00d4ff;
            border: none;
            border-bottom: 4px solid #0099b3;
            color: #0a0a1a;
            font-family: inherit;
            font-size: 0.7rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .submit-btn:hover {
            background: #33e0ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #0099b3;
        }

        .submit-btn:active {
            transform: translateY(0);
            border-bottom-width: 2px;
            box-shadow: 0 2px 0 #0099b3;
        }

        .submit-btn:disabled {
            background: #2a2a4a;
            border-bottom-color: #1a1a3a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #5b21b6;
            border: 3px solid #00d4ff;
            color: #fff;
            font-family: inherit;
            font-size: 0.6rem;
            padding: 1rem 2rem;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.3s ease-out;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: #00ff88;
            background: #0d3b2e;
        }

        .toast.error {
            border-color: #ff4444;
            background: #3b0d0d;
        }

        .nav-link {
            text-align: center;
            margin-top: 2rem;
        }

        .nav-link a {
            color: #4a3a6a;
            font-size: 0.5rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link a:hover {
            color: #ff6b9d;
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }
            .form-box {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="header">
            <h1>Welcome back</h1>
            <div class="subtitle">Leave your mark in the digital void</div>
        </div>

        <div class="form-box">
            <form id="message-form">
                <div class="form-group">
                    <label>Your Name <span class="optional">(optional)</span></label>
                    <input type="text" id="author" placeholder="Anonymous wanderer..." maxlength="30" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="content" placeholder="Write something to the void..." maxlength="500" required></textarea>
                    <div class="char-count" id="char-count">0 / 500</div>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>
            </form>
        </div>

        <div class="nav-link">
            <a href="admin.html">[ Admin Panel ]</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Formspree endpoint
        const FORMSPREE_URL = 'https://formspree.io/f/maqaarvn';
        
        // 钉钉机器人 Webhook（加签方式）
        const DINGTALK_WEBHOOK = 'https://oapi.dingtalk.com/robot/send?access_token=0b0048ad67d76f2546e24c32534694f249c05551fcbed4c7dc8e68edb960727a';
        const DINGTALK_SECRET = 'SEC19088937aed323f74613eba4fafadd70b0e9af24f2e6d7383176fdc2b469b6db';

        // 生成星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 80;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // 字符计数
        const contentEl = document.getElementById('content');
        const charCountEl = document.getElementById('char-count');
        contentEl.addEventListener('input', () => {
            const len = contentEl.value.length;
            charCountEl.textContent = `${len} / 500`;
            charCountEl.className = 'char-count' + (len > 450 ? ' warn' : '');
        });

        // Toast 提示
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (type ? ' ' + type : '');
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 提交留言
        document.getElementById('message-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const author = document.getElementById('author').value.trim() || 'Anonymous';
            const content = document.getElementById('content').value.trim();
            const btn = document.getElementById('submit-btn');

            if (!content) {
                showToast('Message cannot be empty!', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                // 使用 fetch 提交到 Formspree（支持 CORS）
                const resp = await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        author: author,
                        message: content
                    })
                });

                if (resp.ok) {
                    showToast('Message sent!', 'success');
                    document.getElementById('author').value = '';
                    document.getElementById('content').value = '';
                    charCountEl.textContent = '0 / 500';
                    
                    // 异步发送钉钉通知（不阻塞 UI）
                    sendDingTalkNotification(author, content);
                } else {
                    const data = await resp.json();
                    throw new Error(data.error || 'Failed to send');
                }
            } catch (err) {
                console.error('Submit error:', err);
                showToast('Failed to send: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Message';
            }
        });

        // 发送钉钉通知
        async function sendDingTalkNotification(author, content) {
            const now = new Date().toLocaleString('zh-CN');
            const markdownContent = `### 📬 新留言通知\n\n**来自：** ${author}\n\n**留言内容：**\n\n${content}\n\n---\n*${now}*`;
            
            const payload = {
                msgtype: 'markdown',
                markdown: {
                    title: '新留言通知',
                    text: markdownContent
                }
            };
            
            // 生成加签 timestamp 和 sign
            const timestamp = Date.now();
            const stringToSign = timestamp + '\n' + DINGTALK_SECRET;
            
            // 使用 Web Crypto API 计算 HMAC-SHA256
            const encoder = new TextEncoder();
            const keyData = encoder.encode(DINGTALK_SECRET);
            const messageData = encoder.encode(stringToSign);
            
            const cryptoKey = await crypto.subtle.importKey(
                'raw', keyData, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
            );
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, messageData);
            const sign = btoa(String.fromCharCode(...new Uint8Array(signature)));
            
            // 构建带签名的 URL
            const signedUrl = `${DINGTALK_WEBHOOK}&timestamp=${timestamp}&sign=${encodeURIComponent(sign)}`;
            
            // 发送请求
            fetch(signedUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            }).then(resp => {
                if (!resp.ok) {
                    console.warn('DingTalk notification failed:', resp.status);
                }
                return resp.json();
            }).then(data => {
                if (data.errcode !== 0) {
                    console.warn('DingTalk error:', data);
                }
            }).catch(err => {
                console.warn('DingTalk notification error:', err);
            });
        }
    </script>
</body>
</html>
