<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0ff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            text-align: center;
        }

        .header {
            padding: 2rem;
            border: 4px solid #00d4ff;
            background: #050510;
            box-shadow: 8px 8px 0 #000;
        }

        .header h1 {
            font-size: clamp(0.7rem, 3vw, 1rem);
            color: #00d4ff;
            text-shadow: 3px 3px 0 #5b21b6;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .header p {
            font-size: 0.55rem;
            color: #ff6b9d;
            line-height: 2;
            margin-bottom: 1.5rem;
        }

        .admin-btn {
            display: inline-block;
            background: #00d4ff;
            border: none;
            border-bottom: 4px solid #0099b3;
            color: #0a0a1a;
            font-family: inherit;
            font-size: 0.65rem;
            padding: 1rem 2rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.1s;
            margin: 0.5rem;
        }

        .admin-btn:hover {
            background: #33e0ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #0099b3;
        }

        .admin-btn.secondary {
            background: #5b21b6;
            border-bottom-color: #3b1f7a;
            color: #fff;
        }

        .admin-btn.secondary:hover {
            background: #6b31c6;
        }

        .hint {
            font-size: 0.45rem;
            color: #4a3a6a;
            margin-top: 1.5rem;
            line-height: 2;
        }

        .nav-link {
            text-align: center;
            margin-top: 2rem;
        }

        .nav-link a {
            color: #4a3a6a;
            font-size: 0.5rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link a:hover {
            color: #ff6b9d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Panel</h1>
            <p>Message Board Management Console</p>
            
            <a href="https://formspree.io/forms/maqaarvn" target="_blank" class="admin-btn">
                View Submissions
            </a>
            
            <br>
            
            <a href="index.html" class="admin-btn secondary">
                Back to Message Board
            </a>

            <div class="hint">
                Click "View Submissions" to see all messages on Formspree
            </div>
        </div>

        <div class="nav-link">
            <a href="index.html">[ Back to Message Board ]</a>
        </div>
    </div>
</body>
</html>
