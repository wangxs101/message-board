<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0ff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 4px solid #00d4ff;
            background: #050510;
            box-shadow: 8px 8px 0 #000;
        }

        .header h1 {
            font-size: clamp(0.7rem, 3vw, 1rem);
            color: #00d4ff;
            text-shadow: 3px 3px 0 #5b21b6;
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .header .subtitle {
            font-size: 0.5rem;
            color: #ff6b9d;
            letter-spacing: 2px;
        }

        .login-screen {
            max-width: 350px;
            margin: 3rem auto;
            background: #050510;
            border: 4px solid #5b21b6;
            padding: 2rem;
            box-shadow: 8px 8px 0 #000;
            text-align: center;
        }

        .login-screen .lock-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            display: block;
        }

        .login-screen h2 {
            font-size: 0.7rem;
            color: #ff6b9d;
            margin-bottom: 1.5rem;
        }

        .login-screen input {
            width: 100%;
            background: #0a0a1a;
            border: 3px solid #3b1f7a;
            color: #e0e0ff;
            font-family: inherit;
            font-size: 0.6rem;
            padding: 0.75rem;
            margin-bottom: 1rem;
            outline: none;
            text-align: center;
        }

        .login-screen input:focus {
            border-color: #00d4ff;
        }

        .login-screen button {
            width: 100%;
            background: #00d4ff;
            border: none;
            border-bottom: 4px solid #0099b3;
            color: #0a0a1a;
            font-family: inherit;
            font-size: 0.65rem;
            padding: 0.75rem;
            cursor: pointer;
            transition: all 0.1s;
        }

        .login-screen button:hover {
            background: #33e0ff;
        }

        .login-screen .hint {
            font-size: 0.4rem;
            color: #4a3a6a;
            margin-top: 1rem;
            line-height: 1.8;
        }

        .login-error {
            color: #ff4444;
            font-size: 0.5rem;
            margin-bottom: 0.5rem;
            display: none;
        }

        .admin-content {
            display: none;
            text-align: center;
            padding: 3rem 1rem;
        }

        .admin-content.visible {
            display: block;
        }

        .admin-content .redirect-msg {
            font-size: 0.6rem;
            color: #00d4ff;
            margin-bottom: 1.5rem;
            line-height: 2;
        }

        .admin-btn {
            display: inline-block;
            background: #00d4ff;
            border: none;
            border-bottom: 4px solid #0099b3;
            color: #0a0a1a;
            font-family: inherit;
            font-size: 0.65rem;
            padding: 1rem 2rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.1s;
            margin: 0.5rem;
        }

        .admin-btn:hover {
            background: #33e0ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #0099b3;
        }

        .admin-btn.secondary {
            background: #5b21b6;
            border-bottom-color: #3b1f7a;
            color: #fff;
        }

        .admin-btn.secondary:hover {
            background: #6b31c6;
        }

        .nav-link {
            text-align: center;
            margin-top: 2rem;
        }

        .nav-link a {
            color: #4a3a6a;
            font-size: 0.5rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-link a:hover {
            color: #ff6b9d;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #5b21b6;
            border: 3px solid #00d4ff;
            color: #fff;
            font-family: inherit;
            font-size: 0.55rem;
            padding: 0.75rem 1.5rem;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.3s ease-out;
            z-index: 200;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: #00ff88;
            background: #0d3b2e;
        }

        .toast.error {
            border-color: #ff4444;
            background: #3b0d0d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Panel</h1>
            <div class="subtitle">Message Board Management Console</div>
        </div>

        <div class="login-screen" id="login-screen">
            <span class="lock-icon">[LOCK]</span>
            <h2>Authentication Required</h2>
            <div class="login-error" id="login-error">Invalid password</div>
            <input type="password" id="password-input" placeholder="Enter admin password" autocomplete="off">
            <button onclick="handleLogin()">Unlock</button>
            <div class="hint">
                Enter your password to access the admin panel
            </div>
        </div>

        <div class="admin-content" id="admin-content">
            <div class="redirect-msg">
                Messages are stored on Formspree.<br>
                Click below to view all submissions.
            </div>
            
            <a href="https://formspree.io/forms/maqaarvn" target="_blank" class="admin-btn">
                View All Messages
            </a>
            
            <br><br>
            
            <a href="index.html" class="admin-btn secondary">
                Back to Message Board
            </a>
        </div>

        <div class="nav-link">
            <a href="index.html">[ Back to Message Board ]</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const CONFIG = {
            adminPassword: 'admin123'
        };

        function handleLogin() {
            const input = document.getElementById('password-input').value;
            if (input === CONFIG.adminPassword) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').classList.add('visible');
            } else {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('password-input').value = '';
                setTimeout(() => {
                    document.getElementById('login-error').style.display = 'none';
                }, 2000);
            }
        }

        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (type ? ' ' + type : '');
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
